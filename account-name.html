<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改显示名称 · FlowVoice</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="account.css">
</head>
<body class="with-fixed-nav">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <div id="site-nav"></div>
    <script src="nav-include.js"></script>

    <div class="account-wrap">
        <div class="account-card" id="accountCard">
            <p class="account-loading" id="loadingMsg">加载中…</p>
            <div id="pageContent" style="display: none;">
                <a href="account.html" class="account-back">← 返回帐号中心</a>
                <h1>修改显示名称</h1>

                <div class="account-field">
                    <label for="nameInput">显示名称</label>
                    <input type="text" id="nameInput" placeholder="你的名字" autocomplete="nickname">
                </div>
                <button type="button" class="account-btn account-btn-secondary" id="saveNameBtn">保存名称</button>
                <div class="account-msg" id="nameMsg"></div>
            </div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';
        var loadingMsg = document.getElementById('loadingMsg');
        var pageContent = document.getElementById('pageContent');
        var nameInput = document.getElementById('nameInput');
        var saveNameBtn = document.getElementById('saveNameBtn');
        var nameMsg = document.getElementById('nameMsg');

        var currentUser = null;

        function showMsg(el, text, type) {
            el.textContent = text;
            el.className = 'account-msg visible ' + type;
        }

        function hideMsg(el) {
            el.className = 'account-msg';
        }

        function showPage(user) {
            currentUser = user;
            loadingMsg.style.display = 'none';
            pageContent.style.display = 'block';
            _supabase
                .from('profiles')
                .select('display_name')
                .eq('id', user.id)
                .maybeSingle()
                .then(function (res) {
                    if (res.data && res.data.display_name) nameInput.value = res.data.display_name;
                });
        }

        _supabase.auth.getUser().then(function (result) {
            if (result.error || !result.data.user) {
                window.location.href = 'login.html';
                return;
            }
            showPage(result.data.user);
        });

        saveNameBtn.addEventListener('click', function () {
            hideMsg(nameMsg);
            var name = nameInput.value.trim();
            if (!name) {
                showMsg(nameMsg, '名称不能为空', 'error');
                return;
            }
            if (!currentUser) return;
            saveNameBtn.disabled = true;
            saveNameBtn.textContent = '保存中…';
            _supabase
                .from('profiles')
                .update({ display_name: name })
                .eq('id', currentUser.id)
                .then(function (res) {
                    saveNameBtn.disabled = false;
                    saveNameBtn.textContent = '保存名称';
                    if (res.error) {
                        showMsg(nameMsg, res.error.message, 'error');
                    } else {
                        showMsg(nameMsg, '名称已更新', 'success');
                        setTimeout(function () { window.location.href = 'account.html'; }, 800);
                    }
                });
        });
    })();
    </script>
</body>
</html>
