<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 · FlowVoice</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="account.css">
</head>
<body class="with-fixed-nav">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <div id="site-nav"></div>
    <script src="nav-include.js"></script>

    <div class="account-wrap">
        <div class="account-card" id="accountCard">
            <p class="account-loading" id="loadingMsg">加载中…</p>
            <div id="pageContent" style="display: none;">
                <a href="account.html" class="account-back">← 返回帐号中心</a>
                <h1>修改密码</h1>

                <div class="account-field">
                    <label for="oldPwd">当前密码</label>
                    <input type="password" id="oldPwd" autocomplete="current-password" placeholder="••••••••">
                </div>
                <div class="account-field">
                    <label for="newPwd">新密码</label>
                    <input type="password" id="newPwd" autocomplete="new-password" placeholder="至少 6 位" minlength="6">
                </div>
                <div class="account-field">
                    <label for="confirmPwd">确认新密码</label>
                    <input type="password" id="confirmPwd" autocomplete="new-password" placeholder="再次输入新密码">
                </div>
                <button type="button" class="account-btn account-btn-secondary" id="changePwdBtn">修改密码</button>
                <div class="account-msg" id="pwdMsg"></div>
            </div>
        </div>
    </div>

    <script>
    (function () {
        'use strict';
        var loadingMsg = document.getElementById('loadingMsg');
        var pageContent = document.getElementById('pageContent');
        var oldPwd = document.getElementById('oldPwd');
        var newPwd = document.getElementById('newPwd');
        var confirmPwd = document.getElementById('confirmPwd');
        var changePwdBtn = document.getElementById('changePwdBtn');
        var pwdMsg = document.getElementById('pwdMsg');

        var currentUser = null;

        function showMsg(el, text, type) {
            el.textContent = text;
            el.className = 'account-msg visible ' + type;
        }

        function hideMsg(el) {
            el.className = 'account-msg';
        }

        function showPage(user) {
            currentUser = user;
            loadingMsg.style.display = 'none';
            pageContent.style.display = 'block';
        }

        _supabase.auth.getUser().then(function (result) {
            if (result.error || !result.data.user) {
                window.location.href = 'login.html';
                return;
            }
            showPage(result.data.user);
        });

        changePwdBtn.addEventListener('click', function () {
            hideMsg(pwdMsg);

            var oldVal = oldPwd.value;
            var newVal = newPwd.value;
            var confirmVal = confirmPwd.value;

            if (!oldVal) {
                showMsg(pwdMsg, '请输入当前密码', 'error');
                return;
            }
            if (newVal.length < 6) {
                showMsg(pwdMsg, '新密码至少 6 位', 'error');
                return;
            }
            if (newVal !== confirmVal) {
                showMsg(pwdMsg, '两次输入的新密码不一致', 'error');
                return;
            }
            if (!currentUser) return;

            changePwdBtn.disabled = true;
            changePwdBtn.textContent = '验证中…';

            _supabase.auth.signInWithPassword({
                email: currentUser.email,
                password: oldVal
            }).then(function (authRes) {
                if (authRes.error) {
                    changePwdBtn.disabled = false;
                    changePwdBtn.textContent = '修改密码';
                    showMsg(pwdMsg, '当前密码不正确', 'error');
                    return Promise.resolve();
                }
                changePwdBtn.textContent = '修改中…';
                return _supabase.auth.updateUser({ password: newVal }).then(function (updateRes) {
                    changePwdBtn.disabled = false;
                    changePwdBtn.textContent = '修改密码';
                    if (updateRes.error) {
                        showMsg(pwdMsg, updateRes.error.message, 'error');
                    } else {
                        _supabase.auth.signOut().then(function () {
                            window.location.href = 'login.html';
                        });
                    }
                });
            }).catch(function () {
                changePwdBtn.disabled = false;
                changePwdBtn.textContent = '修改密码';
                showMsg(pwdMsg, '网络错误，请稍后再试', 'error');
            });
        });
    })();
    </script>
</body>
</html>
