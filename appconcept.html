<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流声 FlowVoice</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#F6F7FB',
                        card: '#FFFFFF',
                        accent: '#3D7BFF',
                        accentHover: '#2D6AE6',
                        border: '#A88BFF',
                        textPrimary: '#333333',
                        textSecondary: '#999999',
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', 'SF Pro Display', 'Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    },
                    borderRadius: {
                        'card': '24px',
                        'inner': '16px',
                        'pill': '9999px',
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.font.im/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        html { scroll-behavior: smooth; }

        body {
            background-color: #F6F7FB;
            color: #333333;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #F6F7FB; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

        .main-card {
            background: #FFFFFF;
            border: 1.5px solid #A88BFF;
            border-radius: 24px;
            box-shadow: 0 2px 24px rgba(168, 139, 255, 0.08);
        }

        .mode-card {
            background: #FFFFFF;
            border: 1px solid #E8E8EE;
            border-radius: 16px;
        }

        .mode-item {
            transition: all 0.18s ease-out;
            cursor: pointer;
            border-radius: 12px;
            padding: 16px 8px;
        }
        .mode-item:hover,
        .mode-item.active {
            background: rgba(61, 123, 255, 0.06);
        }
        .mode-item:hover i,
        .mode-item.active i {
            color: #3D7BFF;
        }
        .mode-item:hover span,
        .mode-item.active span {
            color: #3D7BFF;
        }

        .pill-btn {
            background: #3D7BFF;
            color: #fff;
            border: none;
            border-radius: 9999px;
            font-weight: 500;
            transition: all 0.18s ease-out;
            box-shadow: 0 2px 12px rgba(61, 123, 255, 0.18);
        }
        .pill-btn:hover {
            background: #2D6AE6;
            box-shadow: 0 4px 20px rgba(61, 123, 255, 0.3);
            transform: translateY(-1px);
        }
        .pill-btn:focus-visible {
            outline: 2px solid #3D7BFF;
            outline-offset: 2px;
        }

        .fade-in {
            opacity: 0;
            transform: translateY(24px);
            animation: fadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .fade-in-delay { animation-delay: 0.15s; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased selection:bg-accent selection:text-white min-h-screen flex items-center justify-center px-4 py-12 md:py-0">

    <div class="main-card w-full max-w-[960px] mx-auto px-8 sm:px-12 md:px-16 lg:px-[72px] py-10 sm:py-12 md:py-14 lg:py-[56px] fade-in">

        <!-- Top Row: Welcome (left) + Logo & Button (right) -->
        <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-8 md:gap-12 mb-12 md:mb-14">

            <!-- Left: Welcome text -->
            <div class="flex-1 min-w-0">
                <h1 class="text-[42px] sm:text-[48px] md:text-[56px] font-bold leading-[1.15] tracking-tight text-accent">
                    流声 FlowVoice
                </h1>
            </div>

            <!-- Right: Logo + Button -->
            <div class="flex flex-col items-end gap-6 shrink-0 pt-1">
                <img src="favicon.ico" alt="FlowVoice" class="w-10 h-10 rounded-lg" style="image-rendering: auto;">
                <button class="pill-btn px-8 py-3.5 text-base flex items-center gap-3">
                    <i class="fa-brands fa-apple text-lg"></i>
                    下载 Mac 版
                    <i class="fa-solid fa-arrow-right text-sm ml-1"></i>
                </button>
            </div>
        </div>

        <!-- Mode Selector Card (bottom) -->
        <div class="mode-card px-6 sm:px-8 py-6 fade-in fade-in-delay">
            <div class="grid grid-cols-3 sm:grid-cols-6 gap-2">

                <div class="mode-item active flex flex-col items-center gap-2.5">
                    <i class="fa-regular fa-file-lines text-xl text-accent"></i>
                    <span class="text-xs font-medium text-accent">智能润色</span>
                </div>

                <div class="mode-item flex flex-col items-center gap-2.5">
                    <i class="fa-regular fa-id-badge text-xl text-gray-500"></i>
                    <span class="text-xs font-medium text-gray-500">多风格</span>
                </div>

                <div class="mode-item flex flex-col items-center gap-2.5">
                    <i class="fa-solid fa-wand-magic-sparkles text-xl text-gray-500"></i>
                    <span class="text-xs font-medium text-gray-500">口语优化</span>
                </div>

                <div class="mode-item flex flex-col items-center gap-2.5">
                    <i class="fa-regular fa-comment-dots text-xl text-gray-500"></i>
                    <span class="text-xs font-medium text-gray-500">全局唤醒</span>
                </div>

                <div class="mode-item flex flex-col items-center gap-2.5">
                    <i class="fa-regular fa-handshake text-xl text-gray-500"></i>
                    <span class="text-xs font-medium text-gray-500">隐私安全</span>
                </div>

                <div class="mode-item flex flex-col items-center gap-2.5">
                    <i class="fa-solid fa-sliders text-xl text-gray-500"></i>
                    <span class="text-xs font-medium text-gray-500">自定义</span>
                </div>

            </div>
        </div>

    </div>

    <script>
        document.querySelectorAll('.mode-item').forEach(function(item) {
            item.addEventListener('click', function() {
                document.querySelectorAll('.mode-item').forEach(function(el) {
                    el.classList.remove('active');
                    el.querySelector('i').classList.remove('text-accent');
                    el.querySelector('i').classList.add('text-gray-500');
                    el.querySelector('span').classList.remove('text-accent');
                    el.querySelector('span').classList.add('text-gray-500');
                });
                this.classList.add('active');
                this.querySelector('i').classList.remove('text-gray-500');
                this.querySelector('i').classList.add('text-accent');
                this.querySelector('span').classList.remove('text-gray-500');
                this.querySelector('span').classList.add('text-accent');
            });
        });
    </script>
</body>
</html>
