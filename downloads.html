<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下载 · FlowVoice</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="nav.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <script src="fa-fallback.js" defer></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        a { text-decoration: none; color: inherit; }

        .downloads-wrap {
            max-width: var(--w-medium);
            margin: 0 auto;
            padding: var(--sp-8) var(--sp-5) 80px;
        }

        .downloads-wrap h1 {
            font-size: clamp(28px, 4vw, 40px);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: var(--sp-6);
            color: #f5f5f7;
        }

        .platform-list {
            display: flex;
            flex-direction: column;
            gap: var(--sp-4);
        }

        .platform-card {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: var(--sp-5);
            padding: var(--sp-5);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--r-md);
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .platform-icon {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            border-radius: var(--r-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }

        .platform-icon.mac {
            background: rgba(255,255,255,0.06);
            color: #f5f5f7;
        }

        .platform-icon.windows {
            background: rgba(0, 120, 215, 0.15);
            color: #5aafff;
        }

        .platform-body {
            flex: 1;
            min-width: 180px;
        }

        .platform-body h2 {
            font-size: 18px;
            font-weight: 600;
            color: #f5f5f7;
        }

        .platform-actions {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .dl-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--sp-2);
            min-width: 148px;
            padding: var(--sp-3) var(--sp-5);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            border-radius: var(--r-sm);
            border: none;
            cursor: pointer;
            transition: filter var(--motion-fast) ease, box-shadow var(--motion-fast) ease;
        }

        .dl-btn-primary {
            background: linear-gradient(135deg, #9A5CF9, #FF2D95);
            color: #fff;
            box-shadow: 0 0 20px rgba(154,92,249,0.2);
        }

        .dl-btn-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 30px rgba(154,92,249,0.35);
        }

        .dl-btn-primary[aria-disabled="true"] {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }

        .dl-btn-secondary {
            background: transparent;
            color: rgba(255,255,255,0.5);
            border: 1px solid rgba(255,255,255,0.10);
        }

        .dl-btn-secondary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        @media (max-width: 639px) {
            .platform-card {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .platform-icon {
                margin: 0 auto;
            }
            .platform-actions {
                align-items: stretch;
            }
            .dl-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body class="with-fixed-nav">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <div id="site-nav"></div>
    <script src="nav-include.js"></script>

    <main class="downloads-wrap">
        <h1>下载 FlowVoice</h1>

        <div class="platform-list">
            <article class="platform-card">
                <div class="platform-icon mac" aria-hidden="true">
                    <i class="fa-brands fa-apple"></i>
                </div>
                <div class="platform-body">
                    <h2>macOS</h2>
                </div>
                <div class="platform-actions">
                    <a href="https://github.com/JOnyou2012/flowvoicewebsite/releases" class="dl-btn dl-btn-primary" id="downloadMac">下载 Mac 版</a>
                </div>
            </article>

            <article class="platform-card">
                <div class="platform-icon windows" aria-hidden="true">
                    <i class="fa-brands fa-windows"></i>
                </div>
                <div class="platform-body">
                    <h2>Windows</h2>
                </div>
                <div class="platform-actions">
                    <button type="button" class="dl-btn dl-btn-secondary" disabled>敬请期待</button>
                </div>
            </article>
        </div>
    </main>
</body>
</html>
