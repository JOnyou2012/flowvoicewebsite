<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 · FlowVoice</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="with-fixed-nav">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <div id="site-nav"></div>
    <script src="nav-include.js"></script>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>重置密码</h1>
            <p class="auth-subtitle">输入你的注册邮箱，我们将发送一封含有重置链接的邮件。</p>

            <form id="forgotForm">
                <div class="auth-field">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" autocomplete="email" required placeholder="you@example.com">
                </div>
                <button type="submit" class="auth-btn" id="submitBtn">发送重置链接</button>
            </form>

            <div class="auth-error" id="errorMsg"></div>
            <div class="auth-success" id="successMsg"></div>

            <p class="auth-footer"><a href="login.html">返回登录</a></p>
        </div>
    </div>

    <script>
    (function () {
        'use strict';
        var form = document.getElementById('forgotForm');
        var emailInput = document.getElementById('email');
        var submitBtn = document.getElementById('submitBtn');
        var errorMsg = document.getElementById('errorMsg');
        var successMsg = document.getElementById('successMsg');

        function showError(msg) {
            successMsg.classList.remove('visible');
            errorMsg.textContent = msg;
            errorMsg.classList.add('visible');
        }
        function showSuccess(msg) {
            errorMsg.classList.remove('visible');
            successMsg.textContent = msg;
            successMsg.classList.add('visible');
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            errorMsg.classList.remove('visible');
            successMsg.classList.remove('visible');

            submitBtn.disabled = true;
            submitBtn.textContent = '发送中…';

            _supabase.auth.resetPasswordForEmail(emailInput.value.trim(), {
                redirectTo: window.location.origin + '/reset-password.html'
            }).then(function (result) {
                submitBtn.disabled = false;
                submitBtn.textContent = '发送重置链接';
                if (result.error) {
                    showError(result.error.message);
                    return;
                }
                showSuccess('重置链接已发送，请查看邮箱（含垃圾箱）。');
                form.style.display = 'none';
            }).catch(function () {
                submitBtn.disabled = false;
                submitBtn.textContent = '发送重置链接';
                showError('网络错误，请稍后再试');
            });
        });
    })();
    </script>
</body>
</html>
