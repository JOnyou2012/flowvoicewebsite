<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · FlowVoice</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="with-fixed-nav">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <div id="site-nav"></div>
    <script src="nav-include.js"></script>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>登录</h1>

            <form id="loginForm">
                <div class="auth-field">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" autocomplete="email" required placeholder="you@example.com">
                </div>
                <div class="auth-field">
                    <label for="password">密码</label>
                    <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="auth-btn" id="submitBtn">登录</button>
            </form>

            <div class="auth-error" id="errorMsg"></div>

            <p class="auth-footer"><a href="forgot-password.html">忘记密码？</a></p>
            <p class="auth-footer"><a href="signup.html">注册</a></p>
        </div>
    </div>

    <script>
    (function () {
        'use strict';
        var form = document.getElementById('loginForm');
        var emailInput = document.getElementById('email');
        var passwordInput = document.getElementById('password');
        var submitBtn = document.getElementById('submitBtn');
        var errorMsg = document.getElementById('errorMsg');

        var errorMap = {
            'Invalid login credentials': '邮箱或密码错误',
            'Email not confirmed': '邮箱尚未验证，请检查收件箱完成验证',
            'User not found': '该邮箱未注册',
            'Too many requests': '请求过于频繁，请稍后再试'
        };
        function friendlyError(msg) { return errorMap[msg] || msg; }

        function showError(msg) {
            errorMsg.textContent = friendlyError(msg);
            errorMsg.classList.add('visible');
        }
        function hideError() {
            errorMsg.classList.remove('visible');
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            hideError();
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中…';

            _supabase.auth.signInWithPassword({
                email: emailInput.value.trim(),
                password: passwordInput.value
            }).then(function (result) {
                if (result.error) {
                    showError(result.error.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '登录';
                    return;
                }
                window.location.href = 'website.html';
            }).catch(function () {
                showError('网络错误，请稍后再试');
                submitBtn.disabled = false;
                submitBtn.textContent = '登录';
            });
        });
    })();
    </script>
</body>
</html>
