<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 · FlowVoice</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="nav.css">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        a { text-decoration: none; color: inherit; }

        .auth-wrapper {
            min-height: calc(100vh - var(--nav-height));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
        }

        .auth-card h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 28px;
        }

        .auth-field {
            margin-bottom: 16px;
        }

        .auth-field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .auth-field input {
            width: 100%;
            padding: 10px 14px;
            font-size: 15px;
            font-family: inherit;
            border: 1px solid #d2d2d7;
            border-radius: 10px;
            background: #fff;
            color: var(--text-primary);
            outline: none;
            transition: border-color 200ms ease;
        }

        .auth-field input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: #1d1d1f;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 200ms ease;
            margin-top: 8px;
        }

        .auth-btn:hover { background: #333; }
        .auth-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .auth-error {
            display: none;
            margin-top: 16px;
            padding: 10px 14px;
            font-size: 13px;
            color: #dc2626;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
        }

        .auth-error.visible { display: block; }

        .auth-success {
            display: none;
            margin-top: 16px;
            padding: 10px 14px;
            font-size: 13px;
            color: #16a34a;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
        }

        .auth-success.visible { display: block; }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: #6366f1;
            font-weight: 500;
        }

        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body class="with-fixed-nav">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <div id="site-nav"></div>
    <script src="nav-include.js"></script>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>创建帐号</h1>

            <form id="signupForm">
                <div class="auth-field">
                    <label for="displayName">显示名称</label>
                    <input type="text" id="displayName" autocomplete="name" required placeholder="你的名字">
                </div>
                <div class="auth-field">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" autocomplete="email" required placeholder="you@example.com">
                </div>
                <div class="auth-field">
                    <label for="password">密码</label>
                    <input type="password" id="password" autocomplete="new-password" required placeholder="至少 6 位" minlength="6">
                </div>
                <div class="auth-field">
                    <label for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" autocomplete="new-password" required placeholder="再次输入密码">
                </div>
                <button type="submit" class="auth-btn" id="submitBtn">注册</button>
            </form>

            <div class="auth-error" id="errorMsg"></div>
            <div class="auth-success" id="successMsg"></div>

            <p class="auth-footer"><a href="login.html">登录</a></p>
        </div>
    </div>

    <script>
    (function () {
        'use strict';
        var form = document.getElementById('signupForm');
        var displayNameInput = document.getElementById('displayName');
        var emailInput = document.getElementById('email');
        var passwordInput = document.getElementById('password');
        var confirmInput = document.getElementById('confirmPassword');
        var submitBtn = document.getElementById('submitBtn');
        var errorMsg = document.getElementById('errorMsg');
        var successMsg = document.getElementById('successMsg');

        function showError(msg) {
            successMsg.classList.remove('visible');
            errorMsg.textContent = msg;
            errorMsg.classList.add('visible');
        }
        function showSuccess(msg) {
            errorMsg.classList.remove('visible');
            successMsg.textContent = msg;
            successMsg.classList.add('visible');
        }
        function hideMessages() {
            errorMsg.classList.remove('visible');
            successMsg.classList.remove('visible');
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            hideMessages();

            if (passwordInput.value !== confirmInput.value) {
                showError('两次输入的密码不一致');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '注册中…';

            var displayName = displayNameInput.value.trim();

            _supabase.auth.signUp({
                email: emailInput.value.trim(),
                password: passwordInput.value,
                options: {
                    data: { display_name: displayName }
                }
            }).then(function (result) {
                if (result.error) {
                    showError(result.error.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '注册';
                    return;
                }

                var session = result.data.session;
                if (session) {
                    _supabase.from('profiles')
                        .update({ display_name: displayName })
                        .eq('id', result.data.user.id)
                        .then(function () {
                            window.location.href = 'website.html';
                        });
                } else {
                    showSuccess('注册成功！请查看邮箱完成验证，然后返回登录。');
                    form.style.display = 'none';
                }
            }).catch(function () {
                showError('网络错误，请稍后再试');
                submitBtn.disabled = false;
                submitBtn.textContent = '注册';
            });
        });
    })();
    </script>
</body>
</html>
