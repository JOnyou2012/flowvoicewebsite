<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 · FlowVoice</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="nav.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="with-fixed-nav">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <div id="site-nav"></div>
    <script src="nav-include.js"></script>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>创建帐号</h1>

            <div id="stepRegister" class="auth-step">
                <form id="signupForm">
                    <div class="auth-field">
                        <label for="displayName">显示名称</label>
                        <input type="text" id="displayName" autocomplete="name" required placeholder="你的名字">
                    </div>
                    <div class="auth-field">
                        <label for="email">邮箱</label>
                        <input type="email" id="email" autocomplete="email" required placeholder="you@example.com">
                    </div>
                    <div class="auth-field">
                        <label for="password">密码</label>
                        <input type="password" id="password" autocomplete="new-password" required placeholder="至少 6 位" minlength="6">
                    </div>
                    <div class="auth-field">
                        <label for="confirmPassword">确认密码</label>
                        <input type="password" id="confirmPassword" autocomplete="new-password" required placeholder="再次输入密码">
                    </div>
                    <button type="submit" class="auth-btn" id="submitBtn">注册</button>
                </form>
            </div>

            <div id="stepOtp" class="auth-step hidden">
                <p class="auth-hint" id="otpHint">我们已向 <strong id="otpEmailDisplay"></strong> 发送 8 位验证码，请在下方输入。</p>
                <form id="otpForm">
                    <div class="auth-field">
                        <label for="otpCode">验证码</label>
                        <input type="text" id="otpCode" class="otp-input" inputmode="numeric" pattern="[0-9]*" maxlength="8" autocomplete="one-time-code" placeholder="00000000" required>
                    </div>
                    <button type="submit" class="auth-btn" id="otpSubmitBtn">验证并完成注册</button>
                    <div class="auth-row-btns">
                        <button type="button" class="auth-btn-secondary" id="resendOtpBtn">重新发送验证码</button>
                        <button type="button" class="auth-btn-secondary" id="backToRegisterBtn">返回修改邮箱</button>
                    </div>
                </form>
            </div>

            <div class="auth-error" id="errorMsg"></div>
            <div class="auth-success" id="successMsg"></div>

            <p class="auth-footer"><a href="login.html">登录</a></p>
        </div>
    </div>

    <script>
    (function () {
        'use strict';
        var form = document.getElementById('signupForm');
        var otpForm = document.getElementById('otpForm');
        var stepRegister = document.getElementById('stepRegister');
        var stepOtp = document.getElementById('stepOtp');
        var displayNameInput = document.getElementById('displayName');
        var emailInput = document.getElementById('email');
        var passwordInput = document.getElementById('password');
        var confirmInput = document.getElementById('confirmPassword');
        var submitBtn = document.getElementById('submitBtn');
        var otpCodeInput = document.getElementById('otpCode');
        var otpSubmitBtn = document.getElementById('otpSubmitBtn');
        var resendOtpBtn = document.getElementById('resendOtpBtn');
        var backToRegisterBtn = document.getElementById('backToRegisterBtn');
        var otpEmailDisplay = document.getElementById('otpEmailDisplay');
        var errorMsg = document.getElementById('errorMsg');
        var successMsg = document.getElementById('successMsg');

        var pendingEmail = '';
        var pendingDisplayName = '';

        function showError(msg) {
            successMsg.classList.remove('visible');
            errorMsg.textContent = msg;
            errorMsg.classList.add('visible');
        }
        function showSuccess(msg) {
            errorMsg.classList.remove('visible');
            successMsg.textContent = msg;
            successMsg.classList.add('visible');
        }
        function hideMessages() {
            errorMsg.classList.remove('visible');
            successMsg.classList.remove('visible');
        }

        function showOtpStep(email, displayName) {
            pendingEmail = email;
            pendingDisplayName = displayName;
            stepRegister.classList.add('hidden');
            stepOtp.classList.remove('hidden');
            otpEmailDisplay.textContent = email;
            otpCodeInput.value = '';
            hideMessages();
            showSuccess('验证码已发送，请查收邮件（含垃圾箱）。');
            setTimeout(function () { otpCodeInput.focus(); }, 100);
        }

        function showRegisterStep() {
            stepOtp.classList.add('hidden');
            stepRegister.classList.remove('hidden');
            pendingEmail = '';
            pendingDisplayName = '';
            hideMessages();
        }

        function finishSignupSession(userId, attempt) {
            attempt = attempt || 1;
            _supabase.from('profiles')
                .update({ display_name: pendingDisplayName })
                .eq('id', userId)
                .then(function (res) {
                    if (res.error && attempt < 2) {
                        setTimeout(function () { finishSignupSession(userId, attempt + 1); }, 600);
                        return;
                    }
                    if (res.error) console.warn('profile update failed:', res.error.message);
                    window.location.href = 'website.html';
                })
                .catch(function () {
                    window.location.href = 'website.html';
                });
        }

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            hideMessages();

            if (passwordInput.value !== confirmInput.value) {
                showError('两次输入的密码不一致');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '注册中…';

            var displayName = displayNameInput.value.trim();
            var email = emailInput.value.trim();

            _supabase.auth.signUp({
                email: email,
                password: passwordInput.value,
                options: {
                    data: { display_name: displayName },
                    emailRedirectTo: window.location.origin + window.location.pathname
                }
            }).then(function (result) {
                if (result.error) {
                    showError(result.error.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '注册';
                    return;
                }

                var session = result.data.session;
                if (session) {
                    pendingDisplayName = displayName;
                    finishSignupSession(result.data.user.id);
                    return;
                }

                showOtpStep(email, displayName);
                submitBtn.disabled = false;
                submitBtn.textContent = '注册';
            }).catch(function () {
                showError('网络错误，请稍后再试');
                submitBtn.disabled = false;
                submitBtn.textContent = '注册';
            });
        });

        otpForm.addEventListener('submit', function (e) {
            e.preventDefault();
            hideMessages();

            var raw = otpCodeInput.value.replace(/\D/g, '');
            if (raw.length !== 8) {
                showError('请输入 8 位数字验证码');
                return;
            }

            otpSubmitBtn.disabled = true;
            otpSubmitBtn.textContent = '验证中…';

            _supabase.auth.verifyOtp({
                email: pendingEmail,
                token: raw,
                type: 'signup'
            }).then(function (result) {
                if (result.error) {
                    return _supabase.auth.verifyOtp({
                        email: pendingEmail,
                        token: raw,
                        type: 'email'
                    });
                }
                return result;
            }).then(function (result) {
                if (result.error) {
                    showError(result.error.message || '验证码无效或已过期');
                    otpSubmitBtn.disabled = false;
                    otpSubmitBtn.textContent = '验证并完成注册';
                    return;
                }

                var user = result.data.user;
                if (user && user.id) {
                    finishSignupSession(user.id);
                } else {
                    showError('验证成功但未获取用户信息，请尝试登录。');
                    otpSubmitBtn.disabled = false;
                    otpSubmitBtn.textContent = '验证并完成注册';
                }
            }).catch(function () {
                showError('网络错误，请稍后再试');
                otpSubmitBtn.disabled = false;
                otpSubmitBtn.textContent = '验证并完成注册';
            });
        });

        resendOtpBtn.addEventListener('click', function () {
            if (!pendingEmail) return;
            hideMessages();
            resendOtpBtn.disabled = true;
            resendOtpBtn.textContent = '发送中…';

            _supabase.auth.resend({
                type: 'signup',
                email: pendingEmail,
                options: {
                    emailRedirectTo: window.location.origin + window.location.pathname
                }
            }).then(function (result) {
                resendOtpBtn.disabled = false;
                resendOtpBtn.textContent = '重新发送验证码';
                if (result.error) {
                    showError(result.error.message);
                    return;
                }
                showSuccess('验证码已重新发送。');
            }).catch(function () {
                resendOtpBtn.disabled = false;
                resendOtpBtn.textContent = '重新发送验证码';
                showError('网络错误，请稍后再试');
            });
        });

        backToRegisterBtn.addEventListener('click', function () {
            showRegisterStep();
        });

        otpCodeInput.addEventListener('input', function () {
            otpCodeInput.value = otpCodeInput.value.replace(/\D/g, '').slice(0, 8);
        });
    })();
    </script>
</body>
</html>
