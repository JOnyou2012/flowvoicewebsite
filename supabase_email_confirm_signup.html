<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="utf-8"><title>验证码</title></head>
<body style="margin:0;padding:0;background-color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <!-- Local preview only. For Supabase dashboard paste supabase_email_confirm_signup_FRAGMENT.html instead. -->
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f5f7;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.06);">
          <tr>
            <td style="padding:40px 40px 8px 40px;text-align:center;">
              <img src="{{ .SiteURL }}/images/logo-email.png" width="160" alt="FlowVoice 流声" style="display:block;margin:0 auto 20px auto;max-width:160px;height:auto;border:0;">
              <h1 style="margin:0 0 8px 0;font-size:22px;font-weight:700;color:#1d1d1f;">验证你的邮箱</h1>
              <p style="margin:0;font-size:15px;line-height:1.5;color:#6e6e73;">请回到注册页面，输入以下 <strong style="color:#1d1d1f;">6 位验证码</strong> 完成注册。</p>
            </td>
          </tr>
          <tr>
            <td style="padding:32px 40px;text-align:center;">
              <p style="margin:0 0 8px 0;font-size:13px;font-weight:600;color:#86868b;letter-spacing:0.06em;text-transform:uppercase;">验证码</p>
              <p style="margin:0;font-size:36px;font-weight:700;letter-spacing:0.35em;color:#1d1d1f;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;">{{.Token}}</p>
              <p style="margin:16px 0 0 0;font-size:12px;color:#86868b;">验证码约 24 小时内有效。若你未注册 FlowVoice，请忽略此邮件。</p>
            </td>
          </tr>
        </table>
        <p style="margin:24px 0 0 0;font-size:11px;color:#aeaeb2;text-align:center;">© FlowVoice 流声</p>
      </td>
    </tr>
  </table>
</body>
</html>
