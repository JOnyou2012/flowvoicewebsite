<!--
  Supabase → Authentication → Email templates → Confirm signup

  1. Add your logo as: images/logo-email.png (see images/README.txt)
  2. Set Site URL in Supabase to your deployed origin (e.g. https://example.com)
  3. Paste the <table>…</table> block into the template body (or full HTML if allowed)

  Logo URL in production: {{ .SiteURL }}/images/logo-email.png
  Fallback if you skip a custom logo: {{ .SiteURL }}/favicon.ico
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>确认注册</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f5f7;padding:40px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background-color:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);border:1px solid rgba(0,0,0,0.06);">
          <tr>
            <td style="padding:40px 40px 8px 40px;text-align:center;">
              <img src="{{ .SiteURL }}/images/logo-email.png" width="160" alt="FlowVoice 流声" style="display:block;margin:0 auto 20px auto;max-width:160px;height:auto;border:0;">
              <h1 style="margin:0 0 8px 0;font-size:22px;font-weight:700;color:#1d1d1f;letter-spacing:-0.02em;">确认你的邮箱</h1>
              <p style="margin:0;font-size:15px;line-height:1.5;color:#6e6e73;">感谢你注册 <strong style="color:#1d1d1f;">FlowVoice 流声</strong>。点下方按钮完成验证，即可开始使用。</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 40px 8px 40px;text-align:center;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 32px;font-size:16px;font-weight:600;color:#ffffff;text-decoration:none;border-radius:12px;background:linear-gradient(90deg,#FF2D95,#9A5CF9,#5AC8FA,#007AFF);">验证邮箱并继续</a>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 40px 32px 40px;text-align:center;">
              <p style="margin:0 0 12px 0;font-size:13px;line-height:1.5;color:#86868b;">若按钮无法点击，请复制以下链接到浏览器打开：</p>
              <p style="margin:0;word-break:break-all;font-size:12px;line-height:1.5;"><a href="{{ .ConfirmationURL }}" style="color:#6366f1;text-decoration:underline;">{{ .ConfirmationURL }}</a></p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 40px 32px 40px;border-top:1px solid #e8e8ed;">
              <p style="margin:24px 0 0 0;font-size:12px;line-height:1.5;color:#86868b;text-align:center;">若你未注册过 FlowVoice，请忽略此邮件。</p>
            </td>
          </tr>
        </table>
        <p style="margin:24px 0 0 0;font-size:11px;color:#aeaeb2;text-align:center;">© FlowVoice 流声</p>
      </td>
    </tr>
  </table>
</body>
</html>
