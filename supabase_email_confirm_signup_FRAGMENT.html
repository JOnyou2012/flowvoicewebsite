<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f5f7;padding:40px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:520px;background-color:#ffffff;border-radius:16px;border:1px solid #e8e8ed;">
        <tr>
          <td style="padding:40px;text-align:center;">
            <img src="{{ .SiteURL }}/images/logo-email.png" width="160" alt="FlowVoice" style="display:block;margin:0 auto 20px;border:0;max-width:160px;height:auto;">
            <h1 style="margin:0 0 12px;font-size:22px;color:#1d1d1f;">验证你的邮箱</h1>
            <p style="margin:0 0 24px;font-size:15px;color:#6e6e73;line-height:1.5;">在注册页面输入以下 8 位验证码：</p>
            <p style="margin:0;font-size:40px;font-weight:700;letter-spacing:0.25em;color:#1d1d1f;font-family:ui-monospace,monospace;">{{.Token}}</p>
            <p style="margin:20px 0 0;font-size:12px;color:#86868b;">约 24 小时内有效。非本人注册请忽略。</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
